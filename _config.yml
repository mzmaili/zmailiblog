# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: "Mohammad Zmaili"
subtitle: "Guiding enterprises to secure modern, cloud-first and AI-enabled environments"
name: "Mohammad Zmaili"
email:
url: "https://zmaili.net"
description: >-
  Helping global enterprises move faster while staying secure and compliant
  by delivering identity-centric, end-to-end security solutions, enhancing
  Zero Trust architectures, and securing AI systems responsibly at scale.
twitter_username: mzmaili
github_username: mzmaili
minimal_mistakes_skin: default
search: true
locale: "en-US"
og_image: "/assets/images/zmaili.jpg"

# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes
# Outputting
permalink: /:categories/:title/
paginate: 12 # amount of posts to show
paginate_path: /page:num/
timezone: # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones

include:
  - _pages

# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
# exclude:
#   - Gemfile
#   - Gemfile.lock
#   - node_modules
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

sass:
  sass_dir: _sass
  style: compressed # https://sass-lang.com/documentation/file.SASS_REFERENCE.html#output_style

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

author:
  name   : "Mohammad Zmaili"
  avatar : "/assets/images/zmaili.jpg"
  og_image : "/assets/images/zmaili.jpg"
  bio    : "Product Manager @ Microsoft Security"
  location: Massachusetts, United States
  links:
    - label: "Website"
      icon: "fas fa-fw fa-link"
      url: "https://zmaili.net/"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/mzmaili"
    - label: "YouTube"
      icon: "fab fa-fw fa-youtube-square"
      url: "https://www.youtube.com/@mzmaili"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin-in"
      url: "https://www.linkedin.com/in/mzmaili/"

# Analytics
analytics:
  provider: google
  google:
    tracking_id: G-413T2L7Z1T
    anonymize_ip: # true, false (default)
    
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/mzmaili"
    - label: "YouTube"
      icon: "fab fa-fw fa-youtube-square"
      url: "https://www.youtube.com/@mzmaili"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin-in"
      url: "https://www.linkedin.com/in/mzmaili/"

defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
      classes: wide
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true
      classes: wide

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
